# hiero-bot.yml
#
# Reference configuration for the Hiero Workflow App.
# Copy to .github/hiero-bot.yml in your repository and customize.
#
# Every module defaults to enabled: false (opt-in).
# Invalid config silently falls back to safe defaults.

_extends: hiero-bot

# ── Assignment Module ──────────────────────────────────────────────────────
assignment:
  enabled: false
  commands:
    - /assign
    - /unassign
  max_open_assignments: 3
  cross_repo_prerequisites: true
  status_labels:
    ready: "status: ready for dev"
    in_progress: "status: in progress"
    blocked: "status: blocked"
    needs_review: "status: needs review"
  skill_levels:
    "skill: good first issue":
      max_completions: 5
      display_name: Good First Issue
    "skill: beginner":
      prerequisites:
        label: "skill: good first issue"
        min_completed: 2
      display_name: Beginner

# ── PR Quality Module ─────────────────────────────────────────────────────
pr_quality:
  enabled: false
  unified_dashboard: true
  checks:
    dco: true
    gpg: true
    merge_conflict: true
    linked_issue: true
    conventional_title: true
    linked_issue_assigned: true
  auto_label: true
  draft_explainer: true

# ── Inactivity Module ─────────────────────────────────────────────────────
inactivity:
  enabled: false
  warn_after_days: 5
  close_after_days: 7
  blocked_checkin_days: 30
  exempt_labels:
    - "status: blocked"
  skip_labels:
    - "status: needs review"

# ── Escalation Module ─────────────────────────────────────────────────────
escalation:
  enabled: false
  rules: []
  # Example:
  #   - label: "priority: high"
  #     notify_team: core-maintainers
  #     cooldown_hours: 24

# ── Onboarding Module ─────────────────────────────────────────────────────
onboarding:
  enabled: false
  welcome_on_first_pr: true
  welcome_message: ""
  check_profile: true

# ── AI Planning Module ─────────────────────────────────────────────────────
ai_planning:
  enabled: false
  trigger_label: "needs-plan"
  model: "gpt-4o-mini"

# ── AI Review Module ──────────────────────────────────────────────────────
ai_review:
  enabled: false
  model: "gpt-4o-mini"
  max_files: 10

# ── Progression Module ────────────────────────────────────────────────────
progression:
  enabled: false
  recommend_on_merge: true
  track_levels: true

# ── Audit Logging ─────────────────────────────────────────────────────────
audit:
  enabled: true
  log_all_decisions: true
  include_reason_in_comments: true
