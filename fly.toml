# Fly.io configuration for the Hiero Workflow App.
# Deploy with: fly deploy

app = 'hiero-workflow-app'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  NODE_ENV = 'production'
  LOG_LEVEL = 'info'

[[services]]
  internal_port = 3000

  [[services.tcp_checks]]
    interval = '30s'
    timeout = '3s'

  [[services.http_checks]]
    method = 'GET'
    path = '/health'

[mounts]
  # SQLite state volume (migrate to Postgres for production)
  source = 'hiero_data'
  destination = '/app/.data'
