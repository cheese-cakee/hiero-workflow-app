services:
  app:
    build: .
    container_name: hiero-workflow-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - APP_ID=${APP_ID}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - PRIVATE_KEY_PATH=${PRIVATE_KEY_PATH:-/run/secrets/private-key.pem}
    secrets:
      - private-key.pem
secrets:
  private-key.pem:
    file: ./private-key.pem
